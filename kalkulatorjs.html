<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Pastel Biru</title>

<style>
/* BACKGROUND ANIMASI */
body {
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

    background: linear-gradient(
        -45deg,
        #e3f2fd,
        #bbdefb,
        #90caf9,
        #cfe8ff,
        #dbeafe,
        #e0f2fe
    );
    background-size: 500% 500%;
    animation: gradientMove 8s ease-in-out infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 100%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 0%; }
    100% { background-position: 0% 50%; }
}

/* CONTAINER */
.calculator {
    background: #ffffff;
    padding: 20px;
    border-radius: 20px;
    width: 270px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* DISPLAY */
.display {
    background: #f5f9ff;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 15px;
    text-align: right;
    overflow: hidden;
}

.history {
    font-size: 12px;
    color: #9aa5b1;
    min-height: 16px;
    word-wrap: break-word;
}

.result {
    font-size: 28px;
    font-weight: bold;
    color: #3a4a5a;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: normal;
}

/* GRID */
.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

/* BUTTON UMUM */
button {
    height: 48px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: #e3f2fd;
    color: #3a4a5a;
    box-shadow: 0 4px 8px rgba(0,0,0,0.08);
}

/* BUTTON ANGKA LEBIH KECIL */
.number {
    height: 42px;
    font-size: 15px;
}

/* HOVER */
button:hover {
    transform: translateY(-2px);
}

/* CLICK */
button:active {
    transform: scale(0.92);
}

/* WARNA */
.operator {
    background: #d0e7ff;
}

.equal {
    background: #b3e5fc;
    height: 104px;
    grid-row: span 2;
}

.clear {
    background: #e1f5fe;
}

.delete {
    background: #e8f0fe;
}

/* 0 PANJANG */
.zero {
    grid-column: span 2;
    background: #cfe8ff;
}
</style>
</head>

<body>

<div class="calculator">

    <div class="display">
        <div class="history" id="history"></div>
        <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
        <button class="clear" onclick="clearAll()">C</button>
        <button class="delete" onclick="deleteLast()">DEL</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="zero number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
    </div>

</div>

<script>
let currentInput = "";
let history = "";

function append(value) {
    currentInput += value;
    updateDisplay();
}

function clearAll() {
    currentInput = "";
    history = "";
    document.getElementById("result").innerText = "0";
    document.getElementById("history").innerText = "";
}

function deleteLast() {
    currentInput = currentInput.slice(0, -1);
    updateDisplay();
}

function updateDisplay() {
    let resultEl = document.getElementById("result");

    resultEl.style.fontSize = "28px";
    resultEl.innerText = currentInput || "0";
}

function calculate() {
    try {
        let result = eval(currentInput);

        history = currentInput + " =";
        document.getElementById("history").innerText = history;

        currentInput = result.toString();

        let resultEl = document.getElementById("result");

        if (currentInput.length > 12) {
            resultEl.style.fontSize = "20px";
        } else {
            resultEl.style.fontSize = "28px";
        }

        resultEl.innerText = currentInput;

    } catch {
        document.getElementById("result").innerText = "Error";
    }
}
</script>

</body>
</html>
