<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000000, #1e3a8a); 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOX */
.login-box {
    background: white;
    width: 350px;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 25px;
    color: #333;
}

/* INPUT */
.input-box {
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
}

.input-box input {
    width: 90%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    transition: 0.3s;
}

.input-box input:focus {
    border-color: #1e3a8a;
    box-shadow: 0 0 5px rgba(30,58,138,0.5);
    outline: none;
}

/* BUTTON */
.button-group {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.btn-register {
    background: none;
    border: none;
    color: #777;
    cursor: pointer;
}

.btn-register:hover {
    color: #1e3a8a;
    text-decoration: underline;
}

.btn-login {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    background: #1e3a8a;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn-login:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>LOGIN</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
    </div>

    <div class="button-group">
        <button class="btn-register">Register</button>
        <button class="btn-login" onclick="login()">Login</button>
    </div>
</div>

<script>
const userBenar = "20377";
const passBenar = "000333111";

function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === userBenar && pass === passBenar) {
        alert("✅ Login Berhasil!");
    } else {
        alert("❌ Username/Password Salah");
    }
}
</script>

</body>
</html>
